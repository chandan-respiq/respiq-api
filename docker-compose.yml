version: "3.9"

services:
  prediction-api:
    build: .
    container_name: respiq_api
    restart: unless-stopped
    ports:
      - "8080:8000"
    volumes:
      - ./models:/app/models:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
